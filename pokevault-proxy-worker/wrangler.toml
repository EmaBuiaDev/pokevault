name = "pokevault-proxy"
main = "src/index.ts"
account_id = "e6c4d1ff864abf6dbcb4ec1e0de6b34a"  # TODO: Fill with your Cloudflare Account ID (see "wrangler whoami" after login)
workers_dev = true
compatibility_date = "2024-12-19"
compatibility_flags = ["nodejs_compat"]

# KV namespace for caching PokeWallet API responses
kv_namespaces = [
  { binding = "CACHE", id = "14e664fe935345578443564f353685b9", preview_id = "f1354c6fde154f51bfe18f9c139d73df" }  # Reset on 2026-04-21 to start from a clean proxy cache
]

# Environment variables
[vars]
ORIGIN_API = "https://api.pokewallet.io"
CACHE_TTL_SECONDS = "259200"
BACKFILL_BATCH_SIZE = "6"

# Triggers for the Worker
[triggers]
crons = ["*/30 * * * *"]
