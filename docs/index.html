<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PokeVault</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1A1A2E;
            color: #B0B0C0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 24px;
        }
        .container {
            max-width: 480px;
            text-align: center;
        }
        .logo {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #3F51B5, #283593);
            border-radius: 20px;
            margin: 0 auto 24px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .logo svg { width: 48px; height: 48px; }
        h1 {
            color: #FFFFFF;
            font-size: 32px;
            margin-bottom: 8px;
        }
        .tagline {
            color: #6B6B8D;
            font-size: 16px;
            margin-bottom: 40px;
        }
        .social-cta {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 14px;
            background: linear-gradient(135deg, #232342, #2C2C52);
            border: 1px solid #34345C;
            border-radius: 18px;
            padding: 14px 18px;
            margin-bottom: 28px;
            text-decoration: none;
            transition: transform 0.2s, background 0.2s, border-color 0.2s;
        }
        .social-cta:hover {
            background: linear-gradient(135deg, #2A2A4A, #34345C);
            border-color: #4A6CF7;
            transform: translateY(-1px);
        }
        .social-icon {
            width: 42px;
            height: 42px;
            border-radius: 14px;
            background: #111122;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .social-icon svg {
            width: 20px;
            height: 20px;
        }
        .social-copy {
            text-align: left;
        }
        .social-label {
            display: block;
            color: #FFFFFF;
            font-size: 14px;
            font-weight: 700;
            line-height: 1.4;
        }
        .social-handle {
            display: block;
            color: #8EA2FF;
            font-size: 13px;
            margin-top: 2px;
        }
        .links {
            display: flex;
            gap: 16px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .links a {
            display: inline-block;
            background: #232342;
            color: #4A6CF7;
            text-decoration: none;
            padding: 12px 24px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            transition: background 0.2s;
        }
        .links a:hover {
            background: #2A2A4A;
        }
        .footer {
            margin-top: 48px;
            font-size: 11px;
            color: #6B6B8D;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="logo">
        <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="10" y="8" width="18" height="26" rx="2" transform="rotate(15 19 21)" fill="#C5CAE9" opacity="0.4"/>
            <rect x="10" y="8" width="18" height="26" rx="2" transform="rotate(-10 19 21)" fill="#C5CAE9" opacity="0.6"/>
            <rect x="10" y="8" width="18" height="26" rx="2" fill="#C5CAE9"/>
            <polygon points="19,17 25,24 19,31 13,24" fill="#F5B800"/>
        </svg>
    </div>

    <h1>PokeVault</h1>
    <p class="tagline">La tua collezione di carte, al sicuro.</p>

    <a class="social-cta" href="https://www.tiktok.com/@pokemondo22?_r=1&amp;_t=ZN-95pJ7LLQ7eh" target="_blank" rel="noopener noreferrer">
        <span class="social-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M14.5 3C14.83 5.1 16.1 6.53 18 7.05V9.72C16.75 9.68 15.67 9.35 14.7 8.76V14.1C14.7 17.49 12.64 20 9.34 20C6.16 20 4 17.67 4 14.72C4 11.58 6.41 9.37 9.52 9.37C9.89 9.37 10.2 9.4 10.54 9.48V12.09C10.23 11.99 9.93 11.95 9.61 11.95C7.88 11.95 6.67 13.11 6.67 14.7C6.67 16.35 7.84 17.42 9.37 17.42C11.18 17.42 12.03 16.08 12.03 14.11V3H14.5Z" fill="#FFFFFF"/>
            </svg>
        </span>
        <span class="social-copy">
            <span class="social-label">Se vuoi essere aggiornato nel mondo Pokemon, seguici su TikTok</span>
            <span class="social-handle">@pokemondo22</span>
        </span>
    </a>

    <div class="links">
        <a href="/pokevault/privacy-policy">Privacy Policy</a>
        <a href="/pokevault/terms">Termini di Servizio</a>
    </div>

    <p class="footer">
        PokeVault non e affiliata a Nintendo, The Pokemon Company o The Pokemon Company International.
    </p>
</div>
</body>
</html>
