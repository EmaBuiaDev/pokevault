<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PokeVault</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1A1A2E;
            color: #B0B0C0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 24px;
        }
        .container {
            max-width: 480px;
            text-align: center;
        }
        .logo {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #3F51B5, #283593);
            border-radius: 20px;
            margin: 0 auto 24px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .logo svg { width: 48px; height: 48px; }
        h1 {
            color: #FFFFFF;
            font-size: 32px;
            margin-bottom: 8px;
        }
        .tagline {
            color: #6B6B8D;
            font-size: 16px;
            margin-bottom: 40px;
        }
        .links {
            display: flex;
            gap: 16px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .links a {
            display: inline-block;
            background: #232342;
            color: #4A6CF7;
            text-decoration: none;
            padding: 12px 24px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            transition: background 0.2s;
        }
        .links a:hover {
            background: #2A2A4A;
        }
        .footer {
            margin-top: 48px;
            font-size: 11px;
            color: #6B6B8D;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="logo">
        <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="10" y="8" width="18" height="26" rx="2" transform="rotate(15 19 21)" fill="#C5CAE9" opacity="0.4"/>
            <rect x="10" y="8" width="18" height="26" rx="2" transform="rotate(-10 19 21)" fill="#C5CAE9" opacity="0.6"/>
            <rect x="10" y="8" width="18" height="26" rx="2" fill="#C5CAE9"/>
            <polygon points="19,17 25,24 19,31 13,24" fill="#F5B800"/>
        </svg>
    </div>

    <h1>PokeVault</h1>
    <p class="tagline">La tua collezione di carte, al sicuro.</p>

    <div class="links">
        <a href="/pokevault/privacy-policy">Privacy Policy</a>
        <a href="/pokevault/terms">Termini di Servizio</a>
    </div>

    <p class="footer">
        PokeVault non e affiliata a Nintendo, The Pokemon Company o The Pokemon Company International.
    </p>
</div>
</body>
</html>
